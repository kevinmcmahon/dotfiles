##### Prefix / basic ergonomics #####

# Change prefix to Ctrl-a (easier on some keyboards)
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# Faster key repetition / snappy ESC (important for Vim/Neovim)
# (Your checkhealth complained about 500ms; this fixes it.)
set -sg escape-time 10

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse (scrollback + pane selection)
set -g mouse on

# Increase scrollback
set -g history-limit 50000

set -g exit-empty off

##### Terminal / colors (tmux 3.4 + Kitty truecolor) #####

# Stable terminfo inside tmux
set -g default-terminal "tmux-256color"

# Tell tmux which outer terminals support RGB so it advertises it to apps
set -sa terminal-features ",xterm-kitty:RGB"
set -sa terminal-features ",xterm-256color:RGB"
set -sa terminal-features ",tmux-256color:RGB"

# Make Neovim happier: allow focus events so autoread etc works
set -g focus-events on

# Make sure SSH agent env vars survive into panes
set -g update-environment "SSH_AUTH_SOCK SSH_AGENT_PID SSH_ASKPASS SSH_CONNECTION"

##### Splits / bindings #####

# Split panes with | and -
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}" 
bind - split-window -v -c "#{pane_current_path}" 

# (Optional) Vim-like pane navigation with Alt-h/j/k/l
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind d detach-client # Ctrl-a d (detach)
bind k confirm-before -p "kill-windows #W? (y/n)" kill-window # Ctrl-a k (kill window)

# Pane navigation
bind tab select-pane -t :.+     # Ctrl-a Tab (cycle panes)


# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"


##### Window title / status #####

# Set terminal title
set -g set-titles on
#set -g set-titles-string "#S / #W"
set -g set-titles-string '#S:#W [#I.#P]'

# Status bar (keep your simple styling)
set -g status-style "bg=#333333 fg=#ffffff"
set -g status-left " #[fg=green]#S "
set -g status-right " #[fg=yellow]%H:%M "

# Current window highlight
setw -g window-status-current-style "fg=black bg=green"

##### Clipboard
set -g set-clipboard on
set -g allow-passthrough on

##### Activity alerts #####

setw -g monitor-activity on
set -g visual-activity off

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'erikw/tmux-powerline'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
