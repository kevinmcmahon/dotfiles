##### Prefix / basic ergonomics #####

# Change prefix to Ctrl-a (easier on some keyboards)
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# Faster key repetition / snappy ESC (important for Vim/Neovim)
# (Your checkhealth complained about 500ms; this fixes it.)
set -sg escape-time 10

# Start windows/panes at 1
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse (scrollback + pane selection)
set -g mouse on

# Increase scrollback
set -g history-limit 50000

set -g exit-empty off

##### Terminal / colors (tmux 3.4 + truecolor) #####

# Stable terminfo inside tmux
set -g default-terminal "tmux-256color"

# Tell tmux which outer terminals support RGB so it advertises it to apps
set -sa terminal-features ",xterm-kitty:RGB"
set -sa terminal-features ",xterm-ghostty:RGB"
set -sa terminal-features ",xterm-256color:RGB"
set -sa terminal-features ",tmux-256color:RGB"

# Make Neovim happier: allow focus events so autoread etc works
set -g focus-events on

# Make sure SSH agent env vars survive into panes
set -g update-environment "SSH_AUTH_SOCK SSH_AGENT_PID SSH_ASKPASS SSH_CONNECTION COLORTERM"

##### Splits / bindings #####

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}" 
bind - split-window -v -c "#{pane_current_path}" 
unbind '"'
unbind %

# (Optional) Vim-like pane navigation with Alt-h/j/k/l
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind d detach-client # Ctrl-a d (detach)
bind k confirm-before -p "kill-windows #W? (y/n)" kill-window # Ctrl-a k (kill window)

# Pane navigation
bind tab select-pane -t :.+     # Ctrl-a Tab (cycle panes)

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

set -g extended-keys on

##### Window title / status #####

# Set terminal title
set -g set-titles on
#set -g set-titles-string "#S / #W"
set -g set-titles-string '#S:#W [#I.#P]'

##### Clipboard
set -g set-clipboard on
set -g allow-passthrough on

##### Activity alerts #####

setw -g monitor-activity on
set -g visual-activity off

# Tell TPM to use XDG-compliant plugin directory
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.config/tmux/plugins/"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'kevinmcmahon/tmux'
set -g @tmux_transparent "on"         # Enable transparency
set -g @tmux_status_show_clock "on"   # Show clock
set -g @tmux_status_show_sysinfo "on" # Show CPU and RAM usage
set -g @tmux_status_show_cwd "on"     # Show current directory

# Customize element order and visibility
set -g @tmux_status_format "cwd|sysinfo|clock"  # Default order

set -g @tmux_theme "mocha"          # Catppuccin Mocha (default)
#set -g @tmux_theme "latte"          # Catppuccin Latte (light)
#set -g @tmux_theme "frappe"         # Catppuccin Frappé
#set -g @tmux_theme "macchiato"      # Catppuccin Macchiato
#set -g @tmux_theme "dracula"        # Dracula theme
#set -g @tmux_theme "nord"           # Nord theme
#set -g @tmux_theme "gruvbox"        # Gruvbox Dark
#set -g @tmux_theme "tokyo-night"    # Tokyo Night
#set -g @tmux_theme "one-dark"       # One Dark

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Strip Nerd Font glyphs when the terminal lacks a patched font (e.g. Termius).
# Most capable terminals (kitty, ghostty/cmux, local xterm-256color) have Nerd
# Fonts; only fall back to ASCII on explicitly dumb/limited terminals.
if-shell '[ "$TERM" = "dumb" ] || [ -n "$TMUX_ASCII_STATUS" ]' {
  run-shell 'bash ~/dotfiles/tmux/ascii-status-override.sh'
}

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'
